<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kto pierwszy?</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, 'Helvetica Neue', sans-serif; }

body {
    display: flex;
    flex-direction: column;
    background: #111;
}

.top-bar {
    position: fixed;
    top: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    height: 60px;
}

.reset-btn {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 40px;
    padding: 12px 40px;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    cursor: pointer;
    touch-action: manipulation;
    transition: all 0.15s;
}

.reset-btn:active {
    transform: scale(0.92);
    background: rgba(255,255,255,0.25);
}

.game-area {
    display: flex;
    width: 100%;
    height: 100vh;
}

.side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    touch-action: manipulation;
    transition: opacity 0.2s;
    position: relative;
}

.side.left {
    background: #1a3a5c;
}

.side.right {
    background: #5c1a2e;
}

.side .label {
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
}

.side .result {
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.side .sub {
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    margin-top: 12px;
}

.side.winner {
    z-index: 2;
}

.side.winner .label {
    color: rgba(255,255,255,0.8);
}

.side.loser {
    opacity: 0.5;
}

.side.loser .result,
.side.loser .sub {
    display: none;
}

.side .tap-instruction {
    font-size: 36px;
    font-weight: 700;
    color: rgba(255,255,255,0.15);
    letter-spacing: 2px;
}

.side.winner .tap-instruction {
    display: none;
}

.side.blocked {
    pointer-events: none;
}

/* confetti-like flash */
.flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.1s;
}

.flash-overlay.active {
    opacity: 0.4;
}

.flash-overlay.left-flash {
    background: radial-gradient(circle at 30% 50%, rgba(100,200,255,0.3), transparent 70%);
}

.flash-overlay.right-flash {
    background: radial-gradient(circle at 70% 50%, rgba(255,100,150,0.3), transparent 70%);
}

@media (prefers-color-scheme: light) {
    body { background: #e0e0e0; }
    .side.left { background: #b3d4f7; }
    .side.right { background: #f7b3c0; }
    .side .label { color: rgba(0,0,0,0.4); }
    .side .result { color: #000; }
    .side .sub { color: rgba(0,0,0,0.5); }
    .side .tap-instruction { color: rgba(0,0,0,0.12); }
    .reset-btn { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.2); color: #000; }
    .reset-btn:active { background: rgba(0,0,0,0.15); }
}
</style>
</head>
<body>

<div class="top-bar">
    <button class="reset-btn" id="resetBtn">↻ RESET</button>
</div>

<div class="game-area">
    <div class="side left" id="leftSide">
        <div class="label">Gracz 1</div>
        <div class="result" id="leftResult"></div>
        <div class="sub" id="leftSub"></div>
        <div class="tap-instruction">TAP</div>
    </div>
    <div class="side right" id="rightSide">
        <div class="label">Gracz 2</div>
        <div class="result" id="rightResult"></div>
        <div class="sub" id="rightSub"></div>
        <div class="tap-instruction">TAP</div>
    </div>
</div>

<div class="flash-overlay left-flash" id="leftFlash"></div>
<div class="flash-overlay right-flash" id="rightFlash"></div>

<script>
(function() {
    const leftSide = document.getElementById('leftSide');
    const rightSide = document.getElementById('rightSide');
    const leftResult = document.getElementById('leftResult');
    const rightResult = document.getElementById('rightResult');
    const leftSub = document.getElementById('leftSub');
    const rightSub = document.getElementById('rightSub');
    const resetBtn = document.getElementById('resetBtn');
    const leftFlash = document.getElementById('leftFlash');
    const rightFlash = document.getElementById('rightFlash');

    let locked = false;

    function reset() {
        locked = false;
        leftSide.classList.remove('winner', 'loser', 'blocked');
        rightSide.classList.remove('winner', 'loser', 'blocked');
        leftResult.textContent = '';
        rightResult.textContent = '';
        leftSub.textContent = '';
        rightSub.textContent = '';
        leftFlash.classList.remove('active');
        rightFlash.classList.remove('active');
    }

    function win(side) {
        if (locked) return;
        locked = true;

        const isLeft = side === 'left';
        const winnerEl = isLeft ? leftSide : rightSide;
        const loserEl = isLeft ? rightSide : leftSide;
        const winnerResult = isLeft ? leftResult : rightResult;
        const winnerSub = isLeft ? leftSub : rightSub;
        const flashEl = isLeft ? leftFlash : rightFlash;

        // Append prefix only if iOS doesn't already have webkit
        const flash = flashEl;
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 300);

        winnerEl.classList.add('winner', 'blocked');
        loserEl.classList.add('loser', 'blocked');

        winnerResult.textContent = '🏆';
        winnerSub.textContent = 'WYGRANA!';
    }

    function handleTap(side) {
        if (locked) return;
        win(side);
    }

    leftSide.addEventListener('click', function(e) {
        e.preventDefault();
        handleTap('left');
    });

    leftSide.addEventListener('touchstart', function(e) {
        e.preventDefault();
        handleTap('left');
    });

    rightSide.addEventListener('click', function(e) {
        e.preventDefault();
        handleTap('right');
    });

    rightSide.addEventListener('touchstart', function(e) {
        e.preventDefault();
        handleTap('right');
    });

    resetBtn.addEventListener('click', function(e) {
        e.preventDefault();
        reset();
    });

    resetBtn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        reset();
    });

    // Prevent all default touch behavior
    document.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, { passive: false });

    // Keyboard support: 1 = left, 2 = right, R = reset
    document.addEventListener('keydown', function(e) {
        if (e.key === '1' || e.key === 'q') handleTap('left');
        else if (e.key === '2' || e.key === 'p') handleTap('right');
        else if (e.key === 'r' || e.key === 'R') reset();
    });
})();
</script>
</body>
</html>
